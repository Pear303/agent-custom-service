<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秋江独钓 · 七言绝句</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: "STKaiti", "KaiTi", "楷体", "Noto Serif SC", "Source Han Serif SC", serif;
      background: #f5efe6;
      overflow-x: hidden;
    }

    /* ===== Background Layers ===== */
    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .bg-gradient {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(200, 180, 160, 0.30) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(180, 200, 210, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 0%, rgba(230, 215, 195, 0.40) 0%, transparent 50%);
    }

    /* Ink wash texture overlay */
    .bg-texture {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.04;
      background-image:
        radial-gradient(circle at 10% 30%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 70% 60%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 40% 80%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 85% 15%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 55% 45%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 25% 90%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 90% 75%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 5% 65%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 60% 10%, #8b7355 1px, transparent 1px),
        radial-gradient(circle at 35% 35%, #8b7355 1px, transparent 1px);
      background-size: 180px 180px;
    }

    /* Floating decorative circles (ink splashes) */
    .bg-splash {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(139, 115, 85, 0.08), transparent 70%);
      animation: floatSplash 12s ease-in-out infinite;
    }
    .bg-splash--1 {
      width: 340px; height: 340px;
      top: -80px; right: -40px;
      animation-delay: 0s;
    }
    .bg-splash--2 {
      width: 260px; height: 260px;
      bottom: 10%; left: -60px;
      animation-delay: -4s;
    }
    .bg-splash--3 {
      width: 180px; height: 180px;
      top: 50%; right: 10%;
      animation-delay: -8s;
    }

    @keyframes floatSplash {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15px, -20px) scale(1.05); }
      66% { transform: translate(-10px, 15px) scale(0.95); }
    }

    /* ===== Main Container ===== */
    .poem-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 24px;
    }

    /* ===== Poem Card ===== */
    .poem-card {
      position: relative;
      width: 100%;
      max-width: 640px;
      background: rgba(255, 252, 248, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 60px 48px 48px;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.06),
        0 1px 4px rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(200, 185, 165, 0.25);
      transition: box-shadow 0.3s ease;
    }

    .poem-card:hover {
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.08),
        0 2px 8px rgba(0, 0, 0, 0.04);
    }

    /* Decorative line at top */
    .poem-card::before {
      content: '';
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #b8a080, transparent);
      border-radius: 2px;
    }

    /* ===== Title & Author ===== */
    .poem-title {
      font-size: 28px;
      font-weight: 400;
      color: #3d3229;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .poem-author {
      text-align: center;
      font-size: 15px;
      color: #8a7a6a;
      letter-spacing: 2px;
      margin-bottom: 40px;
      font-style: normal;
    }

    .poem-author::before,
    .poem-author::after {
      content: '——';
      color: #c8b8a8;
      margin: 0 6px;
    }

    /* ===== Poem Body ===== */
    .poem-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .poem-line {
      font-size: 24px;
      color: #2d241c;
      letter-spacing: 6px;
      line-height: 1.6;
      text-align: center;
      opacity: 0;
      animation: lineFadeIn 0.8s ease forwards;
    }

    .poem-line:nth-child(1) { animation-delay: 0.3s; }
    .poem-line:nth-child(2) { animation-delay: 0.7s; }
    .poem-line:nth-child(3) { animation-delay: 1.1s; }
    .poem-line:nth-child(4) { animation-delay: 1.5s; }

    @keyframes lineFadeIn {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ===== Seal / Stamp Decoration ===== */
    .poem-seal {
      margin-top: 36px;
      text-align: center;
      opacity: 0;
      animation: fadeInSeal 0.6s ease 2.0s forwards;
    }

    .poem-seal svg {
      width: 56px;
      height: 56px;
      opacity: 0.7;
    }

    @keyframes fadeInSeal {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 0.7; transform: scale(1); }
    }

    /* ===== Footer ===== */
    .poem-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: #b0a090;
      letter-spacing: 1px;
      opacity: 0;
      animation: lineFadeIn 0.6s ease 2.2s forwards;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .poem-card {
        padding: 40px 24px 32px;
        border-radius: 14px;
      }
      .poem-card::before {
        top: 18px;
        width: 40px;
      }
      .poem-title {
        font-size: 22px;
        letter-spacing: 3px;
      }
      .poem-author {
        font-size: 13px;
        margin-bottom: 28px;
      }
      .poem-line {
        font-size: 19px;
        letter-spacing: 4px;
        gap: 14px;
      }
      .poem-body {
        gap: 14px;
      }
      .poem-seal svg {
        width: 44px;
        height: 44px;
      }
      .poem-container {
        padding: 40px 16px;
      }
    }

    @media (max-width: 375px) {
      .poem-title {
        font-size: 19px;
        letter-spacing: 2px;
      }
      .poem-line {
        font-size: 17px;
        letter-spacing: 3px;
      }
      .poem-card {
        padding: 32px 16px 24px;
      }
    }

    @media (min-width: 768px) {
      .poem-card {
        padding: 72px 64px 56px;
      }
      .poem-title {
        font-size: 32px;
        letter-spacing: 6px;
      }
      .poem-line {
        font-size: 26px;
        letter-spacing: 8px;
      }
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #c8b8a8;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <!-- Background Layers -->
  <div class="bg-layer">
    <div class="bg-gradient"></div>
    <div class="bg-texture"></div>
    <div class="bg-splash bg-splash--1"></div>
    <div class="bg-splash bg-splash--2"></div>
    <div class="bg-splash bg-splash--3"></div>
  </div>

  <!-- Main Content -->
  <main class="poem-container">
    <article class="poem-card">
      <h1 class="poem-title">秋江独钓</h1>
      <p class="poem-author">佚名</p>

      <div class="poem-body">
        <p class="poem-line">一叶扁舟逐水流</p>
        <p class="poem-line">半江瑟瑟半江秋</p>
        <p class="poem-line">斜阳影里渔歌远</p>
        <p class="poem-line">白鹭洲头暮色收</p>
      </div>

      <!-- Seal / Stamp -->
      <div class="poem-seal">
        <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="54" height="54" rx="4"
                fill="none" stroke="#b04040" stroke-width="2" opacity="0.8"/>
          <text x="30" y="26" text-anchor="middle" dominant-baseline="central"
                font-family="KaiTi, STKaiti, serif" font-size="14"
                fill="#b04040" opacity="0.8">秋</text>
          <text x="30" y="44" text-anchor="middle" dominant-baseline="central"
                font-family="KaiTi, STKaiti, serif" font-size="14"
                fill="#b04040" opacity="0.8">江</text>
        </svg>
      </div>

      <div class="poem-footer">
        —— 丙午年·仲秋 ——
      </div>
    </article>
  </main>

</body>
</html>
